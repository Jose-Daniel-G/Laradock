<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>TaskFlow</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (() => {
      const stored = localStorage.getItem("lte-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: light)").matches;
      const resolved = stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-bs-theme", resolved);
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/admin-lte/css/adminlte.min.css">
</head>
<body class="layout-fixed hold-transition sidebar-mini layout-fixed">

  <app-root></app-root>

  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es5.min.js" crossorigin="anonymous"></script>
  <script src="assets/admin-lte/js/adminlte.min.js"></script>
  <script>
    // Reinicializar AdminLTE despues de que Angular monte el DOM
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if (window.AdminLTE && window.AdminLTE.PushMenu) {
          window.AdminLTE.PushMenu.init();
        }
      }, 600);
    });
  </script>

</body>
</html>
